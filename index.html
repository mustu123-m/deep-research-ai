<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Research Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0e;
  --bg-2: #141416;
  --bg-3: #1c1c20;
  --bg-4: #242428;
  --border: rgba(255,255,255,0.08);
  --border-2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --text-2: #9c9890;
  --text-3: #5c5a56;
  --accent: #c8f060;
  --accent-dim: rgba(200,240,96,0.12);
  --accent-dim-2: rgba(200,240,96,0.06);
  --red: #ff5f5f;
  --red-dim: rgba(255,95,95,0.1);
  --blue: #60b4f0;
  --blue-dim: rgba(96,180,240,0.1);
  --amber: #f0b060;
  --amber-dim: rgba(240,176,96,0.1);
  --font-display: 'DM Serif Display', serif;
  --font-body: 'Instrument Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 16px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
}

.glow {
  position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 400px; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at center, rgba(200,240,96,0.06) 0%, transparent 70%);
}

.app { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 0 24px 80px; }

header {
  padding: 56px 0 48px;
  display: flex; align-items: flex-start; justify-content: space-between;
}

.logo {
  display: flex; flex-direction: column; gap: 4px;
}

.logo-title {
  font-family: var(--font-display);
  font-size: 28px; color: var(--text);
  letter-spacing: -0.02em;
}

.logo-sub {
  font-size: 12px; color: var(--text-3);
  font-family: var(--font-mono);
  letter-spacing: 0.08em; text-transform: uppercase;
}

.nav-tabs {
  display: flex; gap: 4px;
  background: var(--bg-3); border-radius: var(--radius);
  padding: 4px; border: 1px solid var(--border);
}

.nav-tab {
  padding: 6px 16px; border-radius: 7px; font-size: 13px;
  font-family: var(--font-body); font-weight: 500;
  color: var(--text-2); cursor: pointer; border: none;
  background: transparent; transition: all 0.15s;
}

.nav-tab.active {
  background: var(--bg-4); color: var(--text);
  border: 1px solid var(--border-2);
}

.nav-tab:hover:not(.active) { color: var(--text); }

.view { display: none; }
.view.active { display: block; }

/* ── Search form ─────────────────────────────────────────────── */
.search-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 32px;
  margin-bottom: 32px;
}

.search-label {
  font-family: var(--font-display); font-style: italic;
  font-size: 22px; color: var(--text); margin-bottom: 20px; display: block;
}

.search-row { display: flex; gap: 10px; }

.search-input {
  flex: 1; background: var(--bg-3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  font-family: var(--font-body); font-size: 15px; color: var(--text);
  outline: none; transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--border-2); }
.search-input::placeholder { color: var(--text-3); }

.btn-primary {
  background: var(--accent); color: #0c0c0e;
  border: none; border-radius: var(--radius);
  padding: 12px 24px; font-family: var(--font-body);
  font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap; transition: opacity 0.15s;
}

.btn-primary:hover { opacity: 0.88; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.examples {
  margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap;
}

.example-chip {
  font-size: 12px; color: var(--text-3); cursor: pointer;
  border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 12px; background: transparent; font-family: var(--font-body);
  transition: all 0.15s;
}

.example-chip:hover { color: var(--text); border-color: var(--border-2); }

/* ── Pipeline progress ───────────────────────────────────────── */
.run-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px;
}

.run-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.run-topic {
  font-family: var(--font-display); font-size: 17px; color: var(--text);
}

.run-status {
  font-size: 11px; font-family: var(--font-mono);
  padding: 4px 10px; border-radius: 20px; letter-spacing: 0.06em;
  text-transform: uppercase;
}

.run-status.running { background: var(--amber-dim); color: var(--amber); }
.run-status.done { background: var(--accent-dim); color: var(--accent); }
.run-status.error { background: var(--red-dim); color: var(--red); }
.run-status.pending { background: var(--bg-4); color: var(--text-3); }

.pipeline-steps { padding: 8px 0; }

.step {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 14px 24px; transition: background 0.15s;
}

.step:hover { background: rgba(255,255,255,0.02); }

.step-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
  font-size: 13px; font-family: var(--font-mono);
  border: 1px solid var(--border); background: var(--bg-3); color: var(--text-3);
}

.step-icon.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.step-icon.running { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
.step-icon.error { background: var(--red-dim); border-color: var(--red); color: var(--red); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.step-body { flex: 1; min-width: 0; }
.step-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.step-summary { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); }
.step-summary.live { color: var(--amber); }

.connector {
  width: 1px; height: 16px; background: var(--border);
  margin-left: 39px;
}

/* ── Run meta bar ────────────────────────────────────────────── */
.run-meta {
  padding: 14px 24px; border-top: 1px solid var(--border);
  display: flex; gap: 24px; flex-wrap: wrap;
}

.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); font-family: var(--font-mono); }
.meta-value { font-size: 14px; font-weight: 500; color: var(--text); }
.meta-value.accent { color: var(--accent); }

/* ── Report ──────────────────────────────────────────────────── */
.report-wrapper { margin-top: 8px; }

.report-intro {
  font-size: 15px; line-height: 1.8; color: var(--text-2);
  padding: 24px; border-bottom: 1px solid var(--border);
}

.report-section {
  padding: 24px; border-bottom: 1px solid var(--border);
}

.report-section:last-child { border-bottom: none; }

.section-heading {
  font-family: var(--font-display); font-size: 18px;
  color: var(--text); margin-bottom: 10px;
}

.section-content { font-size: 14px; line-height: 1.8; color: var(--text-2); }

.section-note {
  margin-top: 10px; padding: 10px 14px;
  background: var(--amber-dim); border-left: 2px solid var(--amber);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 12px; color: var(--amber);
}

.section-sources {
  margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap;
}

.source-pill {
  font-size: 11px; font-family: var(--font-mono);
  padding: 3px 10px; border-radius: 20px;
  background: var(--bg-4); color: var(--text-3);
  border: 1px solid var(--border); text-decoration: none;
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  display: inline-block;
}

.source-pill:hover { color: var(--text); border-color: var(--border-2); }

.report-conclusion {
  padding: 24px;
  background: var(--accent-dim-2); border-top: 1px solid var(--border);
}

.conclusion-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--accent); font-family: var(--font-mono); margin-bottom: 8px;
}

.conclusion-text { font-size: 14px; line-height: 1.8; color: var(--text-2); }

/* ── History ─────────────────────────────────────────────────── */
.history-list { display: flex; flex-direction: column; gap: 10px; }

.history-item {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: border-color 0.15s;
}

.history-item:hover { border-color: var(--border-2); }

.history-topic { font-size: 14px; font-weight: 500; color: var(--text); }
.history-time { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); margin-top: 3px; }

.btn-ghost {
  font-size: 12px; font-family: var(--font-mono); color: var(--text-3);
  background: var(--bg-4); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px 14px; cursor: pointer;
  transition: all 0.15s; flex-shrink: 0;
}

.btn-ghost:hover { color: var(--text); border-color: var(--border-2); }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-3); font-size: 14px;
}

.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

.error-bar {
  background: var(--red-dim); border: 1px solid rgba(255,95,95,0.2);
  border-radius: var(--radius); padding: 14px 18px;
  font-size: 13px; color: var(--red); margin-bottom: 16px;
  font-family: var(--font-mono);
}

.divider { height: 1px; background: var(--border); margin: 32px 0; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="glow"></div>

<div class="app">
  <header>
    <div class="logo">
      <span class="logo-title">Research Pipeline</span>
      <span class="logo-sub">Multi-Agent · LangGraph · Gemini</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('search')">New run</button>
      <button class="nav-tab" onclick="showView('history')">History</button>
    </div>
  </header>

  <!-- ── Search view ── -->
  <div id="view-search" class="view active">

    <div class="search-card">
      <span class="search-label">What do you want to research?</span>
      <div class="search-row">
        <input
          id="topic-input"
          class="search-input"
          type="text"
          placeholder="e.g. Impact of AI on job market 2025"
          onkeydown="if(event.key==='Enter') startRun()"
        />
        <button class="btn-primary" id="run-btn" onclick="startRun()">
          Run pipeline
        </button>
      </div>
      <div class="examples">
        <span style="font-size:12px;color:var(--text-3);margin-right:4px;">Try:</span>
        <button class="example-chip" onclick="setTopic(this)">Future of remote work 2025</button>
        <button class="example-chip" onclick="setTopic(this)">Quantum computing breakthroughs</button>
        <button class="example-chip" onclick="setTopic(this)">Climate tech investment trends</button>
      </div>
    </div>

    <div id="error-container"></div>
    <div id="run-container"></div>
    <div id="report-container"></div>
  </div>

  <!-- ── History view ── -->
  <div id="view-history" class="view">
    <div id="history-list" class="history-list">
      <div class="empty-state">
        <div class="empty-icon">◎</div>
        Loading history...
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3001/api/research';

const NODES = {
  searcher:    { label: 'Searcher',    icon: '⌕' },
  summarizer:  { label: 'Summarizer',  icon: '≡' },
  analyzer:    { label: 'Analyzer',    icon: '◈' },
  validator:   { label: 'Validator',   icon: '✓' },
  synthesizer: { label: 'Synthesizer', icon: '◎' },
  reporter:    { label: 'Reporter',    icon: '◎' },
};

const ORDER = ['searcher','summarizer','analyzer','validator','synthesizer','reporter'];

let currentRunId = null;
let currentEs = null;
let stepStates = {};

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'history') loadHistory();
}

function setTopic(btn) {
  document.getElementById('topic-input').value = btn.textContent;
  document.getElementById('topic-input').focus();
}

async function startRun() {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) return;

  document.getElementById('run-btn').disabled = true;
  document.getElementById('error-container').innerHTML = '';
  document.getElementById('report-container').innerHTML = '';

  stepStates = {};
  ORDER.forEach(n => stepStates[n] = 'pending');

  renderRunCard(topic, 'pending');

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic }),
    });
    const { runId, error } = await res.json();
    if (error) throw new Error(error);

    currentRunId = runId;
    subscribeToStream(runId, topic);
  } catch (err) {
    showError(err.message);
    document.getElementById('run-btn').disabled = false;
  }
}

function subscribeToStream(runId, topic) {
  if (currentEs) currentEs.close();
  const es = new EventSource(`${API}/${runId}/stream`);
  currentEs = es;

  es.addEventListener('start', () => {
    renderRunCard(topic, 'running');
  });

  es.addEventListener('node_start', e => {
    const { node } = JSON.parse(e.data);
    if (!NODES[node]) return;
    stepStates[node] = 'running';
    updateStep(node, 'running', '');
  });

  es.addEventListener('node_end', e => {
    const { node, summary } = JSON.parse(e.data);
    if (!NODES[node]) return;
    stepStates[node] = 'done';
    updateStep(node, 'done', summary);
  });

  es.addEventListener('done', e => {
    const data = JSON.parse(e.data);
    updateRunStatus('done');
    updateMeta(data);
    document.getElementById('run-btn').disabled = false;
    fetchReport(runId);
    es.close();
  });

  es.addEventListener('error', e => {
    try {
      const data = JSON.parse(e.data);
      showError(data.message);
    } catch {
      if (es.readyState === EventSource.CLOSED) return;
    }
    updateRunStatus('error');
    document.getElementById('run-btn').disabled = false;
    es.close();
  });
}

function renderRunCard(topic, status) {
  const stepsHtml = ORDER.map((node, i) => {
    const n = NODES[node];
    if (!n) return '';
    const connector = i < ORDER.length - 1 ? '<div class="connector"></div>' : '';
    return `
      <div class="step" id="step-${node}">
        <div class="step-icon pending" id="step-icon-${node}">${n.icon}</div>
        <div class="step-body">
          <div class="step-name">${n.label}</div>
          <div class="step-summary" id="step-summary-${node}">Waiting...</div>
        </div>
      </div>
      ${connector}
    `;
  }).join('');

  document.getElementById('run-container').innerHTML = `
    <div class="run-card" id="run-card">
      <div class="run-header">
        <div class="run-topic">${escHtml(topic)}</div>
        <div class="run-status ${status}" id="run-status">${status}</div>
      </div>
      <div class="pipeline-steps">${stepsHtml}</div>
      <div class="run-meta" id="run-meta" style="display:none">
        <div class="meta-item">
          <span class="meta-label">Duration</span>
          <span class="meta-value" id="meta-duration">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Summaries</span>
          <span class="meta-value" id="meta-summaries">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Claims</span>
          <span class="meta-value" id="meta-claims">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Confidence</span>
          <span class="meta-value accent" id="meta-confidence">—</span>
        </div>
      </div>
    </div>
  `;
}

function updateStep(node, state, summary) {
  const icon = document.getElementById('step-icon-' + node);
  const sum = document.getElementById('step-summary-' + node);
  if (!icon || !sum) return;
  icon.className = 'step-icon ' + state;
  if (state === 'running') {
    sum.className = 'step-summary live';
    sum.textContent = 'Running...';
  } else {
    sum.className = 'step-summary';
    sum.textContent = summary || 'Complete';
  }
}

function updateRunStatus(status) {
  const el = document.getElementById('run-status');
  if (el) { el.className = 'run-status ' + status; el.textContent = status; }
}

function updateMeta(data) {
  document.getElementById('run-meta').style.display = 'flex';
  document.getElementById('meta-duration').textContent =
    data.duration_ms ? (data.duration_ms / 1000).toFixed(1) + 's' : '—';
  document.getElementById('meta-summaries').textContent = data.summaries ?? '—';
  document.getElementById('meta-claims').textContent = data.claims ?? '—';
  document.getElementById('meta-confidence').textContent =
    data.confidence ? Math.round(data.confidence * 100) + '%' : '—';
}

async function fetchReport(runId) {
  try {
    const res = await fetch(`${API}/${runId}/report`);
    const { report } = await res.json();
    if (report) renderReport(report);
  } catch (err) {
    showError('Failed to load report: ' + err.message);
  }
}

function renderReport(report) {
  const r = report;

  const sectionsHtml = (r.sections || []).map(s => `
    <div class="report-section">
      <div class="section-heading">${escHtml(s.heading || '')}</div>
      <div class="section-content">${escHtml(s.content || '')}</div>
      ${s.notes ? `<div class="section-note">${escHtml(s.notes)}</div>` : ''}
      ${s.sources && s.sources.length ? `
        <div class="section-sources">
          ${s.sources.map(u => `<a class="source-pill" href="${escHtml(u)}" target="_blank" rel="noopener">${escHtml(u)}</a>`).join('')}
        </div>` : ''}
    </div>
  `).join('');

  const allSources = r.sources_cited || [];
  const sourceListHtml = allSources.length ? `
    <div class="divider"></div>
    <div style="padding: 0 0 16px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);font-family:var(--font-mono);margin-bottom:10px">Sources cited</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${allSources.map(u => `<a class="source-pill" href="${escHtml(u)}" target="_blank" rel="noopener">${escHtml(u)}</a>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('report-container').innerHTML = `
    <div class="run-card report-wrapper">
      <div class="run-header">
        <div class="run-topic">${escHtml(r.topic || 'Report')}</div>
        <div class="run-status done">report ready</div>
      </div>
      ${r.introduction ? `<div class="report-intro">${escHtml(r.introduction)}</div>` : ''}
      ${sectionsHtml}
      ${r.conclusion ? `
        <div class="report-conclusion">
          <div class="conclusion-label">Conclusion</div>
          <div class="conclusion-text">${escHtml(r.conclusion)}</div>
        </div>` : ''}
    </div>
    ${sourceListHtml}
  `;
}

async function loadHistory() {
  const el = document.getElementById('history-list');
  try {
    const res = await fetch(`${API}/history`);
    const runs = await res.json();
    if (!runs.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">◎</div>No runs yet. Start a research run from the New run tab.</div>';
      return;
    }
    el.innerHTML = runs.map(r => `
      <div class="history-item" onclick="loadRun('${r.runId}', '${escHtml(r.topic)}')">
        <div>
          <div class="history-topic">${escHtml(r.topic)}</div>
          <div class="history-time">${formatTime(r.startedAt)} · ${r.status}</div>
        </div>
        <button class="btn-ghost">View report →</button>
      </div>
    `).join('');
  } catch {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">◎</div>Could not load history. Is the API running?</div>';
  }
}

async function loadRun(runId, topic) {
  showView('search');
  document.querySelector('.nav-tab').classList.add('active');
  document.getElementById('topic-input').value = topic;
  document.getElementById('error-container').innerHTML = '';
  document.getElementById('run-container').innerHTML = '';

  try {
    const res = await fetch(`${API}/${runId}/report`);
    const data = await res.json();
    if (data.report) renderReport(data.report);
    else document.getElementById('error-container').innerHTML =
      `<div class="error-bar">Report not ready: ${data.message || data.status}</div>`;
  } catch (err) {
    showError(err.message);
  }
}

function showError(msg) {
  document.getElementById('error-container').innerHTML =
    `<div class="error-bar">✕ ${escHtml(msg)}</div>`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
</script>
